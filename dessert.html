<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food</title>
    <link rel="stylesheet" href="css/dessert.css" />
  </head>
  <body>
    <div id="dessertquestion">Ăn tráng miệng</div>

    <div class="dessert-selection">
      <div class="dessert-item">
        <img src="https://gcs.tripi.vn/public-tripi/tripi-feed/img/474140mYX/cach-lam-kem-dua.jpg" alt="boba" />
        <label
          ><input type="checkbox" name="dessert" value="boba" /> Kem</label
        >
      </div>
      <div class="dessert-item">
        <img src="https://daylambanhngon.com/public/backend/filemanager/source/banhca/banh-ca-nuong-nhat-ban-600x400.jpg" alt="churro" />
        <label
          ><input type="checkbox" name="dessert" value="churro" /> Bánh cá</label
        >
      </div>
      <div class="dessert-item">
        <img src="food/che.jpeg" alt="che" />
        <label><input type="checkbox" name="dessert" value="che" /> chè</label>
      </div>
      <div class="dessert-item">
        <img src="food/mochi.jpeg" alt="mochi" />
        <label
          ><input type="checkbox" name="dessert" value="mochi" /> mochi</label
        >
      </div>
      <div class="dessert-item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT_ctKFokkPgH6MChNK4U5FdjJalxzIwSzUtA&s" alt="randombun" />
        <label
          ><input type="checkbox" name="dessert" value="randombun" /> Tà tữaaaa
          </label
        >
      </div>
      <div class="dessert-item">
        <img src="https://i.ytimg.com/vi/ko2DxFU1ihw/maxresdefault.jpg" alt="taiyaki" />
        <label
          ><input type="checkbox" name="dessert" value="taiyaki" />
          Tàu hủ</label
        >
      </div>
    </div>
    <button class="button" onclick="location.href='activities.html'">
      Nộp UWU
    </button>
<script>
  const checkboxes = document.querySelectorAll(
    'input[name="dessert"]'
  );

  checkboxes.forEach((checkbox) => {

    checkbox.addEventListener("change", () => {

      // Nếu tick món khác Kem
      if (checkbox.value !== "boba" && checkbox.checked) {

        // Bỏ tất cả checkbox khác
        checkboxes.forEach((cb) => {
          cb.checked = false;
        });

        // Tick Kem
        const kem = document.querySelector(
          'input[value="boba"]'
        );

        kem.checked = true;
      }
    });

  });
</script>
  </body>
</html>
