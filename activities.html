<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activities</title>
    <link rel="stylesheet" href="css/activities.css" />
  </head>
  <body>
    <div id="activityquestion"><b>Mình sẽ đii đâuuu z ta?</b></div>
    <div class="activities-selection">
      <div class="activity-item">
        <img src="activities/aquarium.jpeg" alt="aquarium" />
        <label
          ><input
            type="checkbox"
            name="activities"
            value="aquarium"
          />Thuỷ cung</label
        >
      </div>
      <div class="activity-item">
        <img src="activities/arcade.jpeg" alt="arcade" />
        <label
          ><input
            type="checkbox"
            name="activities"
            value="arcade"
          />Trò chơi</label
        >
      </div>
      <div class="activity-item">
        <img src="https://diadiemvietnam.vn/wp-content/uploads/2023/02/cgv-vincom-phu-yen.jpg" alt="cinema" />
        <label
          ><input
            type="checkbox"
            name="activities"
            value="cinema"
          />Xem phim</label
        >
      </div>
      <div class="activity-item">
        <img src="https://toplist.vn/images/800px/-860087.jpg" alt="ceramics" />
        <label
          ><input
            type="checkbox"
            name="activities"
            value="ceramics"
          />Tô tượng</label
        >
      </div>
      <div class="activity-item">
        <img src="https://cdn3.ivivu.com/2023/03/Th%E1%BA%A3o-C%E1%BA%A7m-Vi%C3%AAn-ivivu.jpg" alt="kunsthalle" />
        <label
          ><input
            type="checkbox"
            name="activities"
            value="kunsthalle"
          />Công viên</label
        >
      </div>
      <div class="activity-item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSG6_AAuWVt5Q94mKLH50gMPUWKU0kxfzSJfA&s" alt="park.jpeg" />
        <label
          ><input
            type="checkbox"
            name="activities"
            value="park.jpeg"
          />Dạo phố</label
        >
      </div>
    </div>
    <button class="button" onclick="location.href='lastpage.html'">
      Kết Thúc
    </button>
<script>
  const checkboxes = document.querySelectorAll(
    'input[name="activities"]'
  );

  checkboxes.forEach((checkbox) => {

    checkbox.addEventListener("change", () => {

      // Nếu chọn khác Xem phim
      if (checkbox.value !== "cinema" && checkbox.checked) {

        // Bỏ tất cả
        checkboxes.forEach((cb) => {
          cb.checked = false;
        });

        // Tick Xem phim
        const cinema = document.querySelector(
          'input[value="cinema"]'
        );

        cinema.checked = true;
      }
    });

  });
</script>
  </body>
</html>
