<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food </title>
    <link rel="stylesheet" href="css/food.css" />
  </head>
  <body>
    <div id="foodquestion">
      <b>Lựa món mà Hiền thích điii nàaa? (Gợi ý là Cholibi ấy :D)</b>
    </div>

    <div class="food-selection">
      <div class="food-item">
        <img src="food/banhtrang.jpeg" alt="Burgers, fries and fried chicken" />
        <label
          ><input
            type="checkbox"
            name="food"
            value="Burgers, fries and fried chicken"
          />
          Bánh tráng trộn</label
        >
      </div>
      <div class="food-item">
        <img src="https://down-vn.img.susercontent.com/file/vn-11134207-7qukw-leq0he1y177662" alt="dog" />
        <label
          ><input type="checkbox" name="food" value="hotdog" /> Cá viên chiên</label
        >
      </div>
      <div class="food-item">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT92-qj39haTJmIZ9No6eMShMxNHitqa9AUhQ&s" alt="koreanfood" />
        <label
          ><input type="checkbox" name="food" value="Korean food" /> Ốc </label
        >
      </div>
      <div class="food-item">
        <img src="https://img5.thuthuatphanmem.vn/uploads/2021/12/08/mi-cay-ngon-va-hap-dan_084813894.jpg" alt="pasta" />
        <label><input type="checkbox" name="food" value="pasta" /> Mỳ cayy</label>
      </div>
      <div class="food-item">
        <img src="food/pizza.jpeg" alt="pizza" />
        <label><input type="checkbox" name="food" value="pizza" /> pizza</label>
      </div>
      <div class="food-item">
        <img src="https://i.ytimg.com/vi/YKXBZ6eHkwQ/maxresdefault.jpg" alt="salad" />
        <label><input type="checkbox" name="food" value="salad" /> Lẩu thái</label>
      </div>
      <div class="food-item">
        <img src="https://jollibee.com.vn/media/catalog/product/cache/11f3e6435b23ab624dc55c2d3fe9479d/m/_/m_jolly_-_1-compressed.jpg" alt="steak" />
        <label><input type="checkbox" name="food" value="steak" /> Cholibi</label>
      </div>
      <div class="food-item">
        <img src="food/sushi.jpeg" alt="sushi" />
        <label><input type="checkbox" name="food" value="sushi" /> sushi</label>
      </div>
    </div>
    <button class="button" onclick="location.href='dessert.html'">
      Tiếp UWU
    </button>
<script>
  const checkboxes = document.querySelectorAll('input[name="food"]');

  checkboxes.forEach((checkbox) => {
    checkbox.addEventListener("change", () => {
      // Nếu tick món khác Cholibi
      if (checkbox.value !== "steak" && checkbox.checked) {
        
        // Bỏ tất cả checkbox khác
        checkboxes.forEach((cb) => {
          cb.checked = false;
        });

        // Tick Cholibi
        const cholibi = document.querySelector('input[value="steak"]');
        cholibi.checked = true;
      }
    });
  });
</script>
  </body>
</html>
